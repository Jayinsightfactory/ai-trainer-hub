<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" fill="none">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bgCircle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="150" cy="115" r="80" fill="url(#bgCircle)"/>
  <!-- Magnifying glass body -->
  <circle cx="140" cy="108" r="36" stroke="url(#glassGrad)" stroke-width="5" fill="none" opacity="0.9"/>
  <!-- Glass fill -->
  <circle cx="140" cy="108" r="33" fill="#eef2ff" opacity="0.6"/>
  <!-- Handle -->
  <line x1="167" y1="135" x2="190" y2="158" stroke="#6366f1" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- X mark inside glass -->
  <line x1="130" y1="98" x2="150" y2="118" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="98" x2="130" y2="118" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round"/>
  <!-- Scattered dots -->
  <circle cx="85" cy="80" r="3" fill="#c7d2fe" opacity="0.6"/>
  <circle cx="210" cy="90" r="2.5" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="95" cy="155" r="2" fill="#e0e7ff" opacity="0.7"/>
  <circle cx="200" cy="150" r="3.5" fill="#c7d2fe" opacity="0.4"/>
  <circle cx="220" cy="70" r="2" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="75" cy="120" r="2.5" fill="#e0e7ff" opacity="0.6"/>
  <circle cx="115" cy="60" r="2" fill="#c7d2fe" opacity="0.5"/>
  <circle cx="185" cy="165" r="2" fill="#a5b4fc" opacity="0.4"/>
  <!-- Question mark floating -->
  <path d="M200 60 Q200 52 207 52 Q214 52 214 58 Q214 63 207 65 L207 70" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <circle cx="207" cy="76" r="1.5" fill="#a5b4fc" opacity="0.6"/>
  <!-- Bottom decorative line -->
  <path d="M100 195 Q150 185 200 195" stroke="#e0e7ff" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>