<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" fill="none">
  <defs>
    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="bgOval" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Background oval -->
  <ellipse cx="150" cy="120" rx="90" ry="75" fill="url(#bgOval)"/>
  <!-- Folder back -->
  <path d="M95 85 L95 170 L205 170 L205 85 L160 85 L152 75 L115 75 L107 85 Z" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3" fill="url(#folderGrad)" opacity="0.7"/>
  <!-- Folder front flap -->
  <path d="M95 100 L205 100 L205 170 L95 170 Z" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.6"/>
  <!-- Upload arrow -->
  <path d="M150 155 L150 118" stroke="url(#arrowGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M138 130 L150 115 L162 130" stroke="url(#arrowGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small document icon -->
  <rect x="172" cy="130" y="130" width="18" height="22" rx="2" stroke="#a5b4fc" stroke-width="1.5" fill="#eef2ff" opacity="0.7"/>
  <line x1="176" y1="137" x2="186" y2="137" stroke="#c7d2fe" stroke-width="1" opacity="0.8"/>
  <line x1="176" y1="142" x2="184" y2="142" stroke="#c7d2fe" stroke-width="1" opacity="0.8"/>
  <line x1="176" y1="147" x2="182" y2="147" stroke="#c7d2fe" stroke-width="1" opacity="0.8"/>
  <!-- Decorative dots -->
  <circle cx="80" cy="95" r="2" fill="#c7d2fe" opacity="0.5"/>
  <circle cx="225" cy="100" r="2.5" fill="#e0e7ff" opacity="0.6"/>
  <circle cx="90" cy="180" r="2" fill="#a5b4fc" opacity="0.4"/>
  <circle cx="215" cy="175" r="2" fill="#c7d2fe" opacity="0.5"/>
  <!-- Dashed circle accent -->
  <circle cx="230" cy="75" r="8" stroke="#c7d2fe" stroke-width="1" stroke-dasharray="3 2" fill="none" opacity="0.5"/>
</svg>