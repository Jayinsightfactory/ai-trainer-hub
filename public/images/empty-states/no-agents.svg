<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" fill="none">
  <defs>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#475569" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="plusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="robotBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="150" cy="115" r="82" fill="url(#robotBg)"/>
  <!-- Robot head -->
  <rect x="115" y="75" width="70" height="60" rx="14" stroke="url(#robotGrad)" stroke-width="2.5" fill="#f8fafc" opacity="0.9"/>
  <!-- Antenna -->
  <line x1="150" y1="75" x2="150" y2="60" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="150" cy="56" r="4" fill="#a5b4fc" opacity="0.7"/>
  <!-- Eyes -->
  <circle cx="135" cy="100" r="8" stroke="#64748b" stroke-width="2" fill="#eef2ff" opacity="0.8"/>
  <circle cx="165" cy="100" r="8" stroke="#64748b" stroke-width="2" fill="#eef2ff" opacity="0.8"/>
  <circle cx="135" cy="100" r="3" fill="#6366f1" opacity="0.6"/>
  <circle cx="165" cy="100" r="3" fill="#6366f1" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M138 118 Q150 125 162 118" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Robot ears -->
  <rect x="105" y="90" width="8" height="16" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <rect x="187" y="90" width="8" height="16" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <!-- Plus button -->
  <circle cx="215" cy="155" r="16" fill="url(#plusGrad)" opacity="0.85"/>
  <line x1="208" y1="155" x2="222" y2="155" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="215" y1="148" x2="215" y2="162" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Connection dots and lines -->
  <circle cx="80" cy="130" r="5" fill="#c7d2fe" opacity="0.6"/>
  <circle cx="65" cy="105" r="4" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="90" cy="160" r="3.5" fill="#e0e7ff" opacity="0.6"/>
  <line x1="80" y1="130" x2="65" y2="105" stroke="#c7d2fe" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="130" x2="90" y2="160" stroke="#c7d2fe" stroke-width="1" opacity="0.4"/>
  <circle cx="235" cy="90" r="4" fill="#c7d2fe" opacity="0.5"/>
  <circle cx="248" cy="115" r="3" fill="#a5b4fc" opacity="0.4"/>
  <line x1="235" y1="90" x2="248" y2="115" stroke="#c7d2fe" stroke-width="1" opacity="0.4"/>
  <!-- Decorative dots -->
  <circle cx="100" cy="70" r="2" fill="#e0e7ff" opacity="0.5"/>
  <circle cx="210" cy="65" r="2.5" fill="#c7d2fe" opacity="0.4"/>
  <!-- Dashed outline suggesting "add more" -->
  <rect x="85" y="155" width="45" height="35" rx="8" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" fill="none" opacity="0.3"/>
</svg>