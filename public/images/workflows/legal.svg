<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="lg-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="lg-grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="lg-grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#eef2ff"/>
  <rect x="20" y="20" width="360" height="260" rx="12" fill="url(#lg-grad2)" opacity="0.5"/>
  <!-- Decorative circles -->
  <circle cx="55" cy="45" r="4" fill="#4f46e5" opacity="0.3"/>
  <circle cx="360" cy="70" r="3.5" fill="#1e40af" opacity="0.25"/>
  <circle cx="340" cy="260" r="4" fill="#4f46e5" opacity="0.2"/>
  <circle cx="70" cy="250" r="3" fill="#1e40af" opacity="0.3"/>
  <circle cx="250" cy="40" r="2.5" fill="#4f46e5" opacity="0.3"/>
  <circle cx="100" cy="270" r="3" fill="#1e40af" opacity="0.2"/>
  <!-- Scale of Justice (main) -->
  <rect x="193" y="70" width="6" height="120" rx="3" fill="url(#lg-grad1)" opacity="0.85"/>
  <rect x="170" y="185" width="52" height="8" rx="4" fill="url(#lg-grad1)" opacity="0.7"/>
  <rect x="181" y="60" width="30" height="6" rx="3" fill="url(#lg-grad1)" opacity="0.8"/>
  <!-- Left scale arm -->
  <line x1="196" y1="63" x2="140" y2="83" stroke="url(#lg-grad1)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <!-- Left pan -->
  <path d="M120,83 L130,110 C130,115 150,115 150,110 L160,83 Z" fill="url(#lg-grad1)" opacity="0.5"/>
  <ellipse cx="140" cy="112" rx="12" ry="4" fill="url(#lg-grad1)" opacity="0.4"/>
  <!-- Right scale arm -->
  <line x1="196" y1="63" x2="252" y2="78" stroke="url(#lg-grad1)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <!-- Right pan -->
  <path d="M232,78 L242,105 C242,110 262,110 262,105 L272,78 Z" fill="url(#lg-grad1)" opacity="0.5"/>
  <ellipse cx="252" cy="107" rx="12" ry="4" fill="url(#lg-grad1)" opacity="0.4"/>
  <!-- Circle on top of pillar -->
  <circle cx="196" cy="55" r="8" fill="url(#lg-grad1)" opacity="0.9"/>
  <circle cx="196" cy="55" r="4" fill="white" opacity="0.5"/>
  <!-- Document with checkmark -->
  <rect x="55" y="100" width="60" height="78" rx="8" fill="white" opacity="0.9" stroke="#4f46e5" stroke-width="2" stroke-opacity="0.4"/>
  <rect x="65" y="115" width="35" height="4" rx="2" fill="#4f46e5" opacity="0.4"/>
  <rect x="65" y="125" width="40" height="4" rx="2" fill="#4f46e5" opacity="0.3"/>
  <rect x="65" y="135" width="28" height="4" rx="2" fill="#4f46e5" opacity="0.3"/>
  <rect x="65" y="145" width="36" height="4" rx="2" fill="#4f46e5" opacity="0.25"/>
  <!-- Checkmark on document -->
  <circle cx="85" cy="163" r="10" fill="url(#lg-grad1)" opacity="0.8"/>
  <polyline points="79,163 83,167 91,159" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Shield icon -->
  <path d="M320,140 L320,180 C320,200 345,215 345,215 C345,215 370,200 370,180 L370,140 L345,130 Z" fill="url(#lg-grad1)" opacity="0.7"/>
  <path d="M332,165 L342,175 L358,155" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
  <!-- Inner shield highlight -->
  <path d="M330,148 L330,178 C330,192 345,202 345,202 C345,202 360,192 360,178 L360,148 L345,140 Z" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <!-- Accent dots and lines -->
  <rect x="55" y="240" width="45" height="3" rx="1.5" fill="#4f46e5" opacity="0.3"/>
  <rect x="300" y="245" width="55" height="3" rx="1.5" fill="#1e40af" opacity="0.25"/>
  <circle cx="195" cy="250" r="3" fill="#4f46e5" opacity="0.2"/>
</svg>