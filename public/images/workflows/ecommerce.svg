<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#f0f9ff"/>

  <!-- Large gradient circle -->
  <circle cx="200" cy="155" r="110" fill="url(#bgGrad)" opacity="0.1"/>
  <circle cx="200" cy="155" r="80" fill="url(#bgGrad)" opacity="0.07"/>

  <!-- Decorative dots -->
  <circle cx="55" cy="50" r="4" fill="#3b82f6" opacity="0.25"/>
  <circle cx="350" cy="55" r="3" fill="#0891b2" opacity="0.3"/>
  <circle cx="40" cy="240" r="5" fill="#3b82f6" opacity="0.2"/>
  <circle cx="365" cy="250" r="3.5" fill="#0891b2" opacity="0.25"/>
  <circle cx="320" cy="270" r="2.5" fill="#3b82f6" opacity="0.2"/>
  <circle cx="80" cy="270" r="3" fill="#0891b2" opacity="0.15"/>

  <!-- Shopping bag -->
  <rect x="140" y="100" width="85" height="100" rx="10" fill="url(#bagGrad)" opacity="0.9"/>
  <rect x="145" y="105" width="75" height="90" rx="8" fill="url(#bagGrad)"/>
  <!-- Bag handles -->
  <path d="M160 105 C160 85, 175 80, 182 80 C189 80, 205 85, 205 105" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Bag highlight -->
  <rect x="152" y="115" width="8" height="60" rx="4" fill="#ffffff" opacity="0.2"/>

  <!-- AI Sparkle on bag -->
  <path d="M195 130 L198 122 L201 130 L209 133 L201 136 L198 144 L195 136 L187 133 Z" fill="#ffffff" opacity="0.9"/>
  <path d="M172 150 L174 146 L176 150 L180 152 L176 154 L174 158 L172 154 L168 152 Z" fill="#ffffff" opacity="0.7"/>

  <!-- Package/delivery box (right) -->
  <rect x="255" y="145" width="70" height="60" rx="8" fill="url(#boxGrad)" stroke="#3b82f6" stroke-width="2"/>
  <!-- Box cross lines -->
  <line x1="290" y1="145" x2="290" y2="205" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <line x1="255" y1="175" x2="325" y2="175" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <!-- Box tape -->
  <rect x="282" y="140" width="16" height="18" rx="3" fill="#0891b2" opacity="0.6"/>

  <!-- Chat bubble (top right) -->
  <rect x="280" y="55" width="70" height="50" rx="16" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="295,105 305,105 290,118" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <!-- Chat lines -->
  <rect x="293" y="70" width="40" height="4" rx="2" fill="#3b82f6" opacity="0.5"/>
  <rect x="293" y="80" width="30" height="4" rx="2" fill="#0891b2" opacity="0.4"/>
  <rect x="293" y="90" width="35" height="4" rx="2" fill="#3b82f6" opacity="0.3"/>

  <!-- Floating price tag -->
  <circle cx="90" cy="120" r="22" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="90" cy="120" r="15" fill="url(#bgGrad)" opacity="0.15"/>
  <!-- Tag hole -->
  <circle cx="82" cy="112" r="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Dollar sign simplified as lines -->
  <line x1="90" y1="113" x2="90" y2="128" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <path d="M84 117 C84 114, 96 114, 96 118 C96 122, 84 122, 84 126 C84 129, 96 129, 96 126" stroke="#3b82f6" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Decorative lines -->
  <line x1="50" y1="160" x2="70" y2="160" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="55" y1="170" x2="65" y2="170" stroke="#0891b2" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="340" y1="200" x2="360" y2="200" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Small sparkles -->
  <path d="M130 65 L132 60 L134 65 L139 67 L134 69 L132 74 L130 69 L125 67 Z" fill="#0891b2" opacity="0.4"/>
  <path d="M340 155 L342 151 L344 155 L348 157 L344 159 L342 163 L340 159 L336 157 Z" fill="#3b82f6" opacity="0.35"/>
</svg>